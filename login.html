<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Premium Collection</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f0f0f,#1c1c1c,#111);
}

/* MAIN CARD */
.login-box{
  width:380px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  color:white;
  text-align:center;
  border:1px solid rgba(255,255,255,0.1);
}

/* TITLE */
.login-box h2{
  font-size:28px;
  margin-bottom:8px;
  letter-spacing:1px;
}

.login-box p{
  font-size:13px;
  color:#bbb;
  margin-bottom:25px;
}

/* INPUTS */
.input{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border:none;
  border-radius:12px;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

.input::placeholder{
  color:#ccc;
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#b8965a,#8f6d38);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(184,150,90,0.3);
}

/* FOOT TEXT */
.bottom{
  margin-top:15px;
  font-size:12px;
  color:#aaa;
}

.bottom span{
  color:#b8965a;
  cursor:pointer;
}
/* ===== MOBILE RESPONSIVE ===== */

@media(max-width: 500px){

  body{
    padding:20px;
  }

  .login-box{
    width:100%;
    padding:25px;
    border-radius:16px;
  }

  .login-box h2{
    font-size:22px;
  }

  .login-box p{
    font-size:12px;
  }

  .input{
    padding:12px;
    font-size:14px;
  }

  .btn{
    padding:12px;
    font-size:14px;
  }
}
</style>
</head>

<body>

<div class="login-box">

  <h2>Welcome Back</h2>
  <p>Sign in to continue to Premium Collection</p>

  <input id="name" class="input" placeholder="Enter your name">

  <button class="btn" onclick="login()">
    Login
  </button>

  <div class="bottom">
    Don’t have account? <span onclick="alert('Register page later')">Sign up</span>
  </div>

</div>

<script>

async function login(){

  const name = document.getElementById("name").value;

  if(!name){
    alert("Enter name first!");
    return;
  }

  await fetch("http://localhost:5000/auth/login",{

    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    credentials:"include",
    body:JSON.stringify({ name })
  });

  // redirect back to home
  window.location.href = "asone.htm";
}

</script>

</body>
</html>
